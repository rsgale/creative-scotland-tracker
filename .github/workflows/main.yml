name: Daily RSS Check

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    # This line fixes the permission issue directly in the code
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # Updated to v4

      - name: Set up Python
        uses: actions/setup-python@v5 # Updated to v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install feedparser

      - name: Run script
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
        run: python opportunity_tracker.py

      - name: Commit results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # Only attempt to commit if the file exists and has changed
          if [ -f matched_opportunities.csv ]; then
            git add matched_opportunities.csv
            git commit -m "Update matches" || echo "No changes to commit"
            git push || echo "No changes to push"
          fi
